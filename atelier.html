<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="L'Atelier du Pic Noir : créations artisanales uniques disponibles en boutique en ligne et sur Instagram."
    />
    <title>Atelier du Pic Noir | Ferme des Goublayes</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="canonical" href="https://fermedesgoublayes.fr/atelier.html" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/toggleMobileMenu.js" defer></script>
    <script src="js/loadMenu.js" defer></script>
    <script src="js/loadFooter.js" defer></script>
    <script src="js/displaySpinner.js" defer></script>
  </head>
  
  <body>
    <!-- Menu placeholder -->
    <div id="menu-container"></div>
    
    <div class="page-container">
      <div id="page-loader"><div class="spinner"></div></div>
      <div class="page-wrapper">
        <div class="mobile-image-container workshop-mobile-image">
          <img
            src="images/pages/mobile/Pic Noir.webp"
            class="mobile-image"
            alt="Atelier du Pic Noir"
            fetchpriority="high"
          />
          <a
            class="workshop-instagram-button button"
            href="https://www.instagram.com/atelierdupicnoir/"
            target="_blank"
          ></a>
          <a
            class="workshop-store-button button"
            href="https://atelier-pic-noir.sumupstore.com/"
            target="_blank"
          ></a>
        </div>
        <div class="desktop-image-container">
          <img
            src="images/pages/desktop/Pic Noir.webp"
            class="desktop-image"
            alt="Atelier du Pic Noir"
            fetchpriority="high"
          />
          <a
            class="workshop-instagram-button button"
            href="https://www.instagram.com/atelierdupicnoir/"
            target="_blank"
          ></a>
          <a
            class="workshop-store-button button"
            href="https://atelier-pic-noir.sumupstore.com/"
            target="_blank"
          ></a>
        </div>
      </div>
    </div>
    <div id="footer-container"></div>
  </body>
</html>
