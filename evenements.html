<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Découvrez les évènements et animations organisés à la Ferme des Goublayes à Saint-Alban, Côtes d'Armor."
    />
    <title>Les Évènements | Ferme des Goublayes</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="canonical" href="https://fermedesgoublayes.fr/evenements.html" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/toggleMobileMenu.js" defer></script>
    <script src="js/loadMenu.js" defer></script>
    <script src="js/loadFooter.js" defer></script>
    <script src="js/displaySpinner.js" defer></script>
  </head>

  <body>
    <!-- Menu placeholder -->
    <div id="menu-container"></div>

    <div class="page-container">
      <div id="page-loader"><div class="spinner"></div></div>
      <div class="page-wrapper">
        <div class="mobile-image-container events-mobile-image">
          <img
            src="images/pages/mobile/Evenements.webp"
            class="mobile-image"
            alt="Les évènements"
            fetchpriority="high"
          />
        </div>
        <div class="desktop-image-container">
          <img
            src="images/pages/desktop/Evenements.webp"
            class="desktop-image"
            alt="Les évènements"
            fetchpriority="high"
          />
        </div>

        <!-- Facebook -->
        <a
          class="events-link events-facebook-button"
          target="_blank"
          href="https://www.facebook.com/fermedesgoublayes/"
        ></a>

        <!-- Instagram  -->
        <a
          class="events-link events-instagram-button"
          target="_blank"
          href=""
        ></a>

        <!-- Email -->
        <a
          class="events-link events-mail"
          target="_blank"
          href="mailto:goublayonsferme@mailo.com"
        ></a>

        <!-- Téléphone -->
        <a class="events-link events-phone" href="tel:+33678281398"></a>
      </div>
    </div>
    <div id="footer-container"></div>
  </body>
</html>
