<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Contactez la Ferme des Goublayes à Saint-Alban (22400), Côtes d'Armor. Tél. : 06.78.28.13.98 — fermedesgoublayes@mailo.com"
    />
    <title>Contact | Ferme des Goublayes</title>
    <link rel="canonical" href="https://fermedesgoublayes.fr/contact.html" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/toggleMobileMenu.js" defer></script>
    <script src="js/loadMenu.js" defer></script>
    <script src="js/loadFooter.js" defer></script>
  </head>

  <body>
    <!-- Menu placeholder -->
    <div id="menu-container"></div>

    <div class="page-container">
      <div class="page-images-container">
        <div class="mobile-image-container contact-mobile-image">
          <img
            src="images/contact/Contact-mobile.webp"
            class="mobile-image"
            alt="Contact"
            fetchpriority="high"
          />
        </div>
        <div class="image-container">
          <img
            src="images/contact/Contact.webp"
            class="desktop-image"
            alt="Contact"
            fetchpriority="high"
          />
        </div>
        <div class="image-container contact-image-2">
          <img
            src="images/contact/Contact2.webp"
            class="desktop-image"
            alt="Contact"
            loading="lazy"
          />
        </div>
      </div>
    </div>
    <div id="footer-container"></div>
  </body>
</html>
