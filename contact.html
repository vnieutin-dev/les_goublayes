<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Contactez la Ferme des Goublayes à Saint-Alban (22400), Côtes d'Armor. Tél. : 06.78.28.13.98 — fermedesgoublayes@mailo.com"
    />
    <title>Contact | Ferme des Goublayes</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="canonical" href="https://fermedesgoublayes.fr/contact.html" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/toggleMobileMenu.js" defer></script>
    <script src="js/loadMenu.js" defer></script>
    <script src="js/loadFooter.js" defer></script>
    <script src="js/displaySpinner.js" defer></script>
  </head>

  <body>
    <!-- Menu placeholder -->
    <div id="menu-container"></div>

    <div class="page-container">
      <div id="page-loader"><div class="spinner"></div></div>
      <div class="page-wrapper">
        <div class="mobile-image-container contact-mobile-image">
          <img
            src="images/pages/mobile/Contacts.webp"
            class="mobile-image"
            alt="Contact"
            fetchpriority="high"
          />

          <!-- Email -->
          <a
            class="button-link contact-mail"
            target="_blank"
            href="mailto:goublayonsferme@mailo.com"
          ></a>

          <!-- Téléphone -->
          <a class="button-link contact-phone" href="tel:+33678281398"></a>
        </div>
        <div class="desktop-image-container">
          <img
            src="images/pages/desktop/Contacts.webp"
            class="desktop-image"
            alt="Contact"
            fetchpriority="high"
          />

          <!-- Email -->
          <a
            class="button-link contact-mail"
            target="_blank"
            href="mailto:goublayonsferme@mailo.com"
          ></a>

          <!-- Téléphone -->
          <a class="button-link contact-phone" href="tel:+33678281398"></a>
        </div>
      </div>
    </div>
    <div id="footer-container"></div>
  </body>
</html>
